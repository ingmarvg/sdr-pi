# sdr-pi kernel tuning for RTL-SDR performance.
# Installed to /etc/sysctl.d/99-sdr-pi.conf

# --- USB / network buffer sizing ---
# Default rmem is 16KB. RTL-SDR at 2.4 Msps pushes ~4.8 MB/s per dongle.
# Larger receive buffers prevent dropped samples during brief scheduling delays.
net.core.rmem_max = 2097152
net.core.rmem_default = 1048576

# --- Send buffers ---
# Match wmem to rmem for TCP streaming to phones over the AP.
net.core.wmem_max = 2097152

# --- TCP connection handling ---
# Larger backlog and connection queue for multiple phone clients.
net.core.somaxconn = 512
net.core.netdev_max_backlog = 5000

# --- Memory management ---
# Effectively disable swap — SDR sample buffers must stay in RAM.
# Swap is disabled at the service level; this is a safety net.
vm.swappiness = 1

# Reserve free memory for DMA and USB buffer allocations.
vm.min_free_kbytes = 16384

# OP25 / GNU Radio use many mmap regions for DSP buffers.
vm.max_map_count = 262144

# --- Disk I/O ---
# Batch disk writes to reduce I/O interrupts that can cause sample drops.
vm.dirty_ratio = 20
vm.dirty_background_ratio = 10
vm.dirty_writeback_centisecs = 1500
