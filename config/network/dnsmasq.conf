# DHCP server for the sdr-pi access point.
# Serves DHCP only on wlan0 — eth0 is left untouched (uses upstream DHCP).
interface=wlan0
bind-interfaces

# Range limited to 19 clients — sufficient for field use with phones/laptops.
# Increase the upper bound if more simultaneous clients are expected.
dhcp-range=192.168.4.2,192.168.4.20,255.255.255.0,24h
domain=local
address=/sdr-pi.local/192.168.4.1
